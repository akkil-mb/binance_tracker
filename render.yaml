services:
  - type: web
    name: binance-tracker
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: binance-tracker-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: "*"

databases:
  - name: binance-tracker-db
    databaseName: binance_tracker
    user: binance_tracker
    plan: free
